<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="styles.css">
</head>

    <!-- Заголовок (Header) -->

        <!-- Вміст заголовка тут -->
        <h1>Заголовок сайту</h1>

            <!-- Меню сайту тут -->
            <ul>
                <li><a href="#">Пошук</a></li>
                <li><button>Знайти</button></li>
            </ul>

    <!-- Лінія для відокремлення -->

        <section class="block">

            <p>Тут буде вміст першого блоку.</p>

        <section class="block">
            <h2>Другий блок</h2>

        </section>
    </main>
    <!-- Лінія для відокремлення -->
    <hr>
    <!-- Підвал (Footer) -->
    <footer>
        <!-- Вміст підвалу сайту тут -->
        <p>&copy; 2024 Мій сайт. Усі права захищено.</p>
    </footer>
